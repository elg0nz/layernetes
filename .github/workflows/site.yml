name: Site

# Build the docs + blog site, and deploy it to Cloudflare Pages on pushes to
# main. Pull requests only build (a check that the site compiles) — they do not
# deploy. Path-filtered so unrelated changes don't trigger a site build/deploy.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site.yml"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    name: build + deploy (Cloudflare Pages)
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      # PostHog is inlined at build time: Astro bakes PUBLIC_* env vars into the
      # client bundle during `npm run build`, so they must be present here (the
      # wrangler step below only uploads the already-built dist/). The project
      # token is a public, write-only key — it ships to every browser anyway —
      # so a repo variable is fine; the host defaults to US Cloud if unset.
      - run: npm run build
        env:
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://us.i.posthog.com' }}

      # Deploy only on push to main. Requires two repo secrets:
      #   CLOUDFLARE_API_TOKEN   — token with the "Cloudflare Pages: Edit" permission
      #   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account ID
      # and a Pages project named "layernetes" (see site/README.md).
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          # --branch=main forces a production deploy: GitHub Actions checks out a
          # detached HEAD, so wrangler's branch auto-detection can otherwise land
          # this on a preview URL instead of the production layernetes.pages.dev.
          command: pages deploy dist --project-name=layernetes --branch=main
