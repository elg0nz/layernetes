{{- if .Values.actRunner.enabled }}
# Gitea Actions runner with a docker-in-docker sidecar for image builds.
# Fixed name (gitea-act-runner): referenced by the README's troubleshooting
# commands.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-act-runner
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: gitea-act-runner
    {{- include "ll-infra.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.actRunner.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-act-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-act-runner
        {{- include "ll-infra.labels" . | nindent 8 }}
      annotations:
        # act_runner reads its config only at startup; roll the pod when it changes.
        checksum/config: {{ include (print $.Template.BasePath "/act-runner/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.actRunner.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runner
          image: "{{ .Values.actRunner.image.repository }}:{{ .Values.actRunner.image.tag }}"
          env:
            - name: CONFIG_FILE
              value: /config/config.yaml
            - name: GITEA_INSTANCE_URL
              value: {{ .Values.actRunner.giteaUrl | default (include "ll-infra.giteaInternalURL" .) | quote }}
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ll-act-runner-token
                  key: token
            - name: GITEA_RUNNER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GITEA_RUNNER_LABELS
              value: {{ join "," .Values.actRunner.labels | quote }}
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: runner-config
              mountPath: /config
              readOnly: true
        - name: dind
          image: "{{ .Values.actRunner.dind.image.repository }}:{{ .Values.actRunner.dind.image.tag }}"
          securityContext:
            privileged: true
          env:
            # Plain-TCP daemon on localhost only; the pod is the trust boundary.
            - name: DOCKER_TLS_CERTDIR
              value: ""
          {{- with .Values.actRunner.dind.insecureRegistries }}
          args:
            {{- range . }}
            - --insecure-registry={{ . }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
      volumes:
        - name: runner-data
          emptyDir: {}
        - name: runner-config
          configMap:
            name: gitea-act-runner-config
        - name: dind-storage
          emptyDir: {}
{{- end }}
