{{- if or .Values.actRunner.enabled .Values.gitea.enabled }}
# Shared Actions runner registration token. Gitea pre-registers it (injected
# as GITEA_RUNNER_REGISTRATION_TOKEN via the gitea subchart's deployment.env)
# and the act-runner deployment registers with it. Fixed name: referenced
# literally from the gitea subchart values.
apiVersion: v1
kind: Secret
metadata:
  name: ll-act-runner-token
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ll-act-runner-token
    {{- include "ll-infra.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "actRunner.token is required (40 alphanumeric chars)" .Values.actRunner.token | quote }}
{{- end }}
