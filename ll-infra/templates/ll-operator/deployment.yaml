{{- if .Values.llOperator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ll-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ll-operator
    {{- include "ll-infra.labels" . | nindent 4 }}
spec:
  replicas: 1 # kopf runs single-instance (no leader election in standalone mode)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ll-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ll-operator
        {{- include "ll-infra.labels" . | nindent 8 }}
    spec:
      serviceAccountName: ll-operator
      containers:
        - name: ll-operator
          image: "{{ .Values.llOperator.image.repository }}:{{ .Values.llOperator.image.tag }}"
          imagePullPolicy: {{ .Values.llOperator.image.pullPolicy }}
          env:
            - name: PLATFORM_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- /* Canonical agents domain first (it's the one used for status.url),
                   then any extras. Comma-separated; the operator splits it. */}}
            - name: AGENTS_DOMAINS
              value: {{ join "," (prepend (.Values.llOperator.extraAgentsDomains | default list) .Values.global.hosts.agents) | quote }}
            - name: AGENT_URL_SCHEME
              value: {{ .Values.global.urlScheme | quote }}
            - name: AGENT_URL_PORT_SUFFIX
              value: {{ .Values.global.urlPortSuffix | quote }}
            - name: INGRESS_CLASS_NAME
              value: {{ .Values.global.ingressClassName | quote }}
            # Where agent pods expect the age key mounted (runtime contract).
            - name: AGE_KEY_MOUNT_PATH
              value: /var/run/secrets/llnate/age.key
            {{- with .Values.llOperator.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.llOperator.resources | nindent 12 }}
{{- end }}
