{{- if .Values.llApi.enabled }}
# ll-api writes LLAgent CRs and creates/deletes age-key Secrets, all inside
# the platform namespace. Teardown of agent namespaces is ll-operator's job
# (finalizer on the CR), so no cluster-wide permissions are needed here.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ll-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ll-api
    {{- include "ll-infra.labels" . | nindent 4 }}
rules:
  - apiGroups: ["layernetes.learninglayer.ai"]
    resources: ["llagents", "llagents/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ll-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ll-api
    {{- include "ll-infra.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ll-api
subjects:
  - kind: ServiceAccount
    name: ll-api
    namespace: {{ .Release.Namespace }}
{{- end }}
