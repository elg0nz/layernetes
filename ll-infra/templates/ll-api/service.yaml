{{- if .Values.llApi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ll-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ll-api
    {{- include "ll-infra.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: ll-api
  ports:
    - name: http
      port: 8000
      targetPort: http
{{- end }}
