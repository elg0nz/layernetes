{{- if .Values.llApi.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ll-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ll-api
    {{- include "ll-infra.labels" . | nindent 4 }}
spec:
  {{- with .Values.global.ingressClassName }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    {{- /* Canonical host plus any extraHosts.api, one rule each, same backend. */}}
    {{- range prepend (.Values.global.extraHosts.api | default list) .Values.global.hosts.api }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ll-api
                port:
                  name: http
    {{- end }}
{{- end }}
