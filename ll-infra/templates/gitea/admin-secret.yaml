{{- if or .Values.gitea.enabled .Values.llApi.enabled }}
# Gitea admin credentials, shared by the gitea subchart (initial admin user)
# and ll-api (repo/user provisioning). Fixed name: the gitea subchart values
# reference it as `gitea.admin.existingSecret`.
apiVersion: v1
kind: Secret
metadata:
  name: ll-gitea-admin
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ll-gitea-admin
    {{- include "ll-infra.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ required "giteaAdmin.username is required" .Values.giteaAdmin.username | quote }}
  password: {{ required "giteaAdmin.password is required" .Values.giteaAdmin.password | quote }}
  email: {{ .Values.giteaAdmin.email | quote }}
{{- end }}
